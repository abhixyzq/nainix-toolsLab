<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Glow Filters & Gradients -->
  <defs>
    <!-- Cyan to Blue Cyber Gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    
    <!-- Neon Eye Core Gradient -->
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Dark Mode Shadow Glow -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Hexagonal Shield Outline (Tech Grid Look) -->
  <path d="M50 8 L85 24 V58 C85 76 50 90 50 90 C50 90 15 76 15 58 V24 Z" 
        stroke="url(#shieldGrad)" 
        stroke-width="5" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        fill="#0a0a0a"
        fill-opacity="0.9"
        filter="url(#neonGlow)" />

  <!-- Technical Circuit Dots (Top Left/Right corners of shield) -->
  <circle cx="50" cy="8" r="3" fill="#00f0ff" />
  <circle cx="85" cy="24" r="2.5" fill="#3b82f6" />
  <circle cx="15" cy="24" r="2.5" fill="#3b82f6" />

  <!-- Futuristic Cyber Eye (The Vision / Vigilance) -->
  <!-- Outer Eye Curve -->
  <path d="M28 50 C 36 36, 64 36, 72 50 C 64 64, 36 64, 28 50 Z" 
        stroke="#00f0ff" 
        stroke-width="3" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        opacity="0.8" />
        
  <!-- Tech Iris Rings -->
  <circle cx="50" cy="50" r="10" stroke="url(#eyeGrad)" stroke-width="2.5" stroke-dasharray="4 2" />
  
  <!-- Central Hacker 'N' / Pupil Core -->
  <g filter="url(#neonGlow)">
    <path d="M44 56 V44 L56 56 V44" 
          stroke="#ffffff" 
          stroke-width="3" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
  </g>

  <!-- Crosshair elements/radar sweeps -->
  <path d="M50 35 V40" stroke="#00f0ff" stroke-width="2" stroke-linecap="round" />
  <path d="M50 60 V65" stroke="#00f0ff" stroke-width="2" stroke-linecap="round" />
  <path d="M35 50 H40" stroke="#00f0ff" stroke-width="2" stroke-linecap="round" />
  <path d="M60 50 H65" stroke="#00f0ff" stroke-width="2" stroke-linecap="round" />
</svg>
